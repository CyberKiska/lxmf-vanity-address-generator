name: Build binaries

on:
  push:
    branches: [main]

concurrency:
  group: build-binaries-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BINARY_BASENAME: lxmf-vanity

jobs:
  build:
    name: ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: arm64 }

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          suffix=""
          if [ "$GOOS" = windows ]; then suffix=".exe"; fi
          out="${BINARY_BASENAME}-${GOOS}-${GOARCH}${suffix}"
          go build -trimpath -ldflags="-s -w" -o "$out" .
          sha256sum "$out" | tee "${out}.sha256"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.BINARY_BASENAME }}-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error
          path: |
            ${{ env.BINARY_BASENAME }}-${{ matrix.goos }}-${{ matrix.goarch }}*
          retention-days: 60
